---
- name: Bootstrap Python 3.9 on RHEL 8 servers
  hosts: all
  gather_facts: no
  become: yes

  tasks:
    - name: Disable netdata and broken repos first
      raw: |
        for repo in /etc/yum.repos.d/*.repo; do
          if grep -qiE "netdata|pgdg" "$repo" 2>/dev/null; then
            sed -i 's/^enabled=1/enabled=0/g' "$repo"
            echo "Disabled: $repo"
          fi
        done
        dnf clean all 2>/dev/null || true
      ignore_errors: yes

    - name: Install Python 3.9
      raw: dnf install -y python39 2>&1
      ignore_errors: yes

    - name: Verify Python 3.9 installed
      raw: /usr/bin/python3.9 --version
      register: python_version
      ignore_errors: yes

    - name: Show Python version
      debug:
        msg: "{{ python_version.stdout | default('not installed') }}"
