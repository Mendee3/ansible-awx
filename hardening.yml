---
- name: Server Hardening Playbook
  hosts: all
  become: yes
  remote_user: scloud

  vars:
    admin_users:
      - admin_mendjargal
      - admin_yusunerdene
      - admin_bilegsaikhan
    admin_default_password_hash: "$6$Gr0DVDnjxnICa9z0$khljvhytg2qnyUxDVEOwmbqq2mb3CaI4jb3kmZDqtzC9RSRepdxxsTnBD7jyP80Bx.BSNNItAK4ZuSCWGANPa."

  roles:
    - repo_cleanup
    - packages
    - ntp
    - password_policy
    - admin_users
    - ssh_hardening
    - cis_benchmark

  post_tasks:
    - name: Pause - verify admin SSH access before locking scloud
      pause:
        prompt: |
          Admin users are created. SSH is open with NO IP restriction yet.
          Please verify each admin can log in with their default password:
            ssh admin_mendjargal@<server-ip>
            ssh admin_yusunerdene@<server-ip>
            ssh admin_bilegsaikhan@<server-ip>
          Press Enter to apply per-IP restrictions and lock scloud, or Ctrl+C to abort.

    - name: Apply per-user per-IP SSH restriction
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^AllowUsers'
        line: 'AllowUsers admin_mendjargal@10.32.11.102 admin_yusunerdene@10.32.10.32 admin_bilegsaikhan@10.32.10.162'

    - name: Lock scloud shell (disable interactive login)
      command: usermod -s /sbin/nologin scloud

    - name: Lock scloud password
      user:
        name: scloud
        password_lock: yes

    - name: Restart SSH to apply final restrictions
      systemd:
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: restarted
