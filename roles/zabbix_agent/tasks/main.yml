---
- name: Install Zabbix repo and agent (RHEL)
  shell: |
    rpm -Uvh https://repo.zabbix.com/zabbix/7.4/release/el/8/noarch/zabbix-release-latest-8.el8.noarch.rpm 2>/dev/null || true
    dnf clean all
    dnf install -y zabbix-agent
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Install Zabbix repo and agent (Ubuntu/Debian)
  shell: |
    UBUNTU_VER="{{ ansible_distribution_version }}"
    ZBX_BASE="https://repo.zabbix.com/zabbix/7.4/release/ubuntu/pool/main/z/zabbix-release"
    for VER in "${UBUNTU_VER}" "24.04"; do
      URL="${ZBX_BASE}/zabbix-release_latest_7.4+ubuntu${VER}_all.deb"
      if wget -q --spider "${URL}" 2>/dev/null; then
        wget -q "${URL}" -O /tmp/zabbix-release.deb
        dpkg -i /tmp/zabbix-release.deb
        apt-get update -y
        apt-get install -y zabbix-agent
        exit 0
      fi
    done
    apt-get install -y zabbix-agent
  when: ansible_os_family == "Debian"
  ignore_errors: yes

- name: Ensure config directory exists
  file:
    path: /etc/zabbix/zabbix_agentd.conf.d
    state: directory
    owner: zabbix
    group: zabbix
    mode: '0755'

- name: Ensure log directory exists
  file:
    path: /var/log/zabbix
    state: directory
    owner: zabbix
    group: zabbix
    mode: '0755'

- name: Ensure run directory exists
  file:
    path: /run/zabbix
    state: directory
    owner: zabbix
    group: zabbix
    mode: '0755'

- name: Replace main zabbix_agentd.conf with Include-only
  copy:
    content: "Include=/etc/zabbix/zabbix_agentd.conf.d/*.conf\n"
    dest: /etc/zabbix/zabbix_agentd.conf
    owner: root
    group: zabbix
    mode: '0640'
  notify: restart zabbix-agent

- name: Deploy Zabbix agent drop-in config
  template:
    src: zabbix_agentd.conf.j2
    dest: /etc/zabbix/zabbix_agentd.conf.d/zabbix.conf
    owner: zabbix
    group: zabbix
    mode: '0644'
  notify: restart zabbix-agent

- name: Enable and start zabbix-agent
  service:
    name: zabbix-agent
    state: started
    enabled: yes

- name: Verify zabbix-agent is running
  command: systemctl is-active zabbix-agent
  register: zabbix_status
  ignore_errors: yes

- name: Show zabbix-agent status
  debug:
    msg: "{{ zabbix_status.stdout }}"
