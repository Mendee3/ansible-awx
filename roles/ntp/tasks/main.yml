---
- name: Install chrony (RHEL/CentOS/Oracle/Alma)
  dnf:
    name: chrony
    state: present
  when: ansible_os_family == "RedHat"
  notify: restart chrony

- name: Install chrony (Ubuntu/Debian)
  apt:
    name: chrony
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"
  notify: restart chrony

- name: Configure NTP server (RHEL)
  lineinfile:
    path: /etc/chrony.conf
    regexp: '^server 172.18.9.2'
    line: 'server 172.18.9.2 iburst'
    create: yes
  when: ansible_os_family == "RedHat"
  notify: restart chrony

- name: Remove default NTP pools (RHEL)
  lineinfile:
    path: /etc/chrony.conf
    regexp: '^pool '
    state: absent
  when: ansible_os_family == "RedHat"
  notify: restart chrony

- name: Configure NTP server (Debian)
  lineinfile:
    path: /etc/chrony/chrony.conf
    regexp: '^server 172.18.9.2'
    line: 'server 172.18.9.2 iburst'
    create: yes
  when: ansible_os_family == "Debian"
  notify: restart chrony

- name: Remove default NTP pools (Debian)
  lineinfile:
    path: /etc/chrony/chrony.conf
    regexp: '^pool '
    state: absent
  when: ansible_os_family == "Debian"
  notify: restart chrony

- name: Enable and start chrony (RHEL)
  systemd:
    name: chronyd
    enabled: yes
    state: started
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Enable and start chrony (Debian)
  systemd:
    name: chrony
    enabled: yes
    state: started
  when: ansible_os_family == "Debian"
  ignore_errors: yes

- name: Set timezone to Asia/Ulaanbaatar (UTC+8)
  command: timedatectl set-timezone Asia/Ulaanbaatar
  changed_when: false

- name: Verify timezone is set correctly
  command: timedatectl show --property=Timezone
  register: timezone_result
  changed_when: false

- name: Show current timezone
  debug:
    msg: "{{ timezone_result.stdout }}"
