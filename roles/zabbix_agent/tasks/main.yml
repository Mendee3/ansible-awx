---
- name: Install Zabbix repo and agent (RHEL)
  shell: |
    rpm -Uvh https://repo.zabbix.com/zabbix/7.4/release/el/8/noarch/zabbix-release-latest-8.el8.noarch.rpm 2>/dev/null || true
    dnf clean all
    dnf install -y zabbix-agent
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Install Zabbix repo and agent (Ubuntu/Debian)
  shell: |
    wget -q https://repo.zabbix.com/zabbix/7.4/release/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest_7.4+ubuntu24.04_all.deb -O /tmp/zabbix-release.deb
    dpkg -i /tmp/zabbix-release.deb
    apt-get update -y
    apt-get install -y zabbix-agent
  when: ansible_os_family == "Debian"
  ignore_errors: yes

- name: Ensure config directory exists
  file:
    path: /etc/zabbix/zabbix_agentd.conf.d
    state: directory
    owner: zabbix
    group: zabbix
    mode: '0755'

- name: Ensure log directory exists
  file:
    path: /var/log/zabbix
    state: directory
    owner: zabbix
    group: zabbix
    mode: '0755'

- name: Ensure run directory exists
  file:
    path: /run/zabbix
    state: directory
    owner: zabbix
    group: zabbix
    mode: '0755'

- name: Deploy Zabbix agent config
  template:
    src: zabbix_agentd.conf.j2
    dest: /etc/zabbix/zabbix_agentd.conf.d/zabbix.conf
    owner: zabbix
    group: zabbix
    mode: '0644'
  notify: restart zabbix-agent

- name: Enable and start zabbix-agent
  service:
    name: zabbix-agent
    state: started
    enabled: yes

- name: Verify zabbix-agent is running
  command: systemctl is-active zabbix-agent
  register: zabbix_status
  ignore_errors: yes

- name: Show zabbix-agent status
  debug:
    msg: "{{ zabbix_status.stdout }}"
