---
- name: Clean yum/dnf cache (RHEL)
  command: dnf clean all
  when: ansible_os_family == "RedHat"
  changed_when: false
  ignore_errors: yes

- name: Stop unattended-upgrades temporarily
  systemd:
    name: unattended-upgrades
    state: stopped
  when: ansible_os_family == "Debian"
  ignore_errors: yes

- name: Wait for apt lock to be released
  shell: |
    while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
      sleep 5
    done
  changed_when: false
  when: ansible_os_family == "Debian"

# ... all install tasks ...

- name: Restart unattended-upgrades after install
  systemd:
    name: unattended-upgrades
    state: started
  when: ansible_os_family == "Debian"
  ignore_errors: yes

- name: Install required packages (AlmaLinux)
  shell: |
    dnf install -y \
      --disablerepo="*" \
      --enablerepo="baseos,appstream,extras,crb,almalinux*" \
      net-tools \
      net-snmp \
      net-snmp-utils \
      vim \
      htop \
      unzip \
      lvm2 \
      firewalld 2>&1
  when: ansible_distribution == "AlmaLinux"
  ignore_errors: yes
  changed_when: false

- name: Install required packages (Oracle Linux)
  shell: |
    dnf install -y \
      --disablerepo="*" \
      --enablerepo="baseos,appstream,ol9_baseos_latest,ol9_appstream" \
      net-tools \
      net-snmp \
      net-snmp-utils \
      vim \
      htop \
      unzip \
      lvm2 \
      firewalld 2>&1
  when: ansible_distribution == "OracleLinux"
  ignore_errors: yes
  changed_when: false

- name: Install required packages (RHEL/CentOS)
  shell: |
    dnf install -y \
      --disablerepo="*" \
      --enablerepo="baseos,appstream,extras,crb,rhel*" \
      net-tools \
      net-snmp \
      net-snmp-utils \
      vim \
      htop \
      unzip \
      lvm2 \
      firewalld 2>&1
  when: ansible_os_family == "RedHat" and ansible_distribution not in ["AlmaLinux", "OracleLinux"]
  ignore_errors: yes
  changed_when: false

- name: Wait for apt lock to be released
  shell: |
    while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1; do
      echo "Waiting for apt lock..."
      sleep 5
    done
  changed_when: false
  when: ansible_os_family == "Debian"

- name: Install required packages (Ubuntu/Debian)
  apt:
    name:
      - net-tools
      - snmp
      - snmpd
      - vim
      - htop
      - unzip
      - lvm2
      - firewalld
    state: present
    update_cache: yes
    lock_timeout: 300
  when: ansible_os_family == "Debian"
  ignore_errors: yes

- name: Install Zabbix repo (RHEL)
  dnf:
    name: "https://repo.zabbix.com/zabbix/6.0/rhel/{{ ansible_distribution_major_version }}/x86_64/zabbix-release-6.0-4.el{{ ansible_distribution_major_version }}.noarch.rpm"
    state: present
    disable_gpg_check: yes
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Install Zabbix agent (RHEL)
  dnf:
    name: zabbix-agent
    state: present
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Install Zabbix repo (Ubuntu/Debian)
  apt:
    deb: "https://repo.zabbix.com/zabbix/6.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_6.0-4+ubuntu{{ ansible_distribution_version }}_all.deb"
  when: ansible_os_family == "Debian"
  ignore_errors: yes

- name: Install Zabbix agent (Ubuntu/Debian)
  apt:
    name: zabbix-agent
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"
  ignore_errors: yes

- name: Enable and start Zabbix agent
  systemd:
    name: zabbix-agent
    enabled: yes
    state: started
  ignore_errors: yes

- name: Full system update (RHEL)
  dnf:
    name: "*"
    state: latest
    update_cache: yes
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Full system update (Debian)
  apt:
    upgrade: full
    update_cache: yes
    lock_timeout: 300
  when: ansible_os_family == "Debian"
  ignore_errors: yes

- name: Check if reboot is required (RHEL)
  command: needs-restarting -r
  register: reboot_required_rhel
  changed_when: false
  failed_when: false
  when: ansible_os_family == "RedHat"

- name: Check if reboot is required (Debian)
  stat:
    path: /var/run/reboot-required
  register: reboot_required_debian
  when: ansible_os_family == "Debian"

- name: Print reboot status (RHEL)
  debug:
    msg: "REBOOT REQUIRED on {{ inventory_hostname }} — kernel or core libraries updated"
  when:
    - ansible_os_family == "RedHat"
    - reboot_required_rhel.rc == 1

- name: Print reboot status (Debian)
  debug:
    msg: "REBOOT REQUIRED on {{ inventory_hostname }} — kernel or core libraries updated"
  when:
    - ansible_os_family == "Debian"
    - reboot_required_debian.stat.exists

- name: Print no reboot needed (RHEL)
  debug:
    msg: "No reboot required on {{ inventory_hostname }}"
  when:
    - ansible_os_family == "RedHat"
    - reboot_required_rhel.rc == 0

- name: Print no reboot needed (Debian)
  debug:
    msg: "No reboot required on {{ inventory_hostname }}"
  when:
    - ansible_os_family == "Debian"
    - not reboot_required_debian.stat.exists
