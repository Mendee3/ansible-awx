---
- name: Apply per-IP SSH restrictions and lock scloud
  hosts: all
  become: yes

  tasks:
    - name: Apply per-user per-IP SSH restriction
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^AllowUsers'
        line: 'AllowUsers admin_mendjargal@10.32.11.102 admin_yusunerdene@10.32.10.32 admin_bilegsaikhan@10.32.10.162'

    - name: Lock scloud shell (disable interactive login)
      command: usermod -s /sbin/nologin scloud

    - name: Lock scloud password
      user:
        name: scloud
        password_lock: yes

    - name: Restart SSH to apply final restrictions
      systemd:
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: restarted
