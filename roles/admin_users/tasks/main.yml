---
- name: Ensure sshgroup exists
  group:
    name: sshgroup
    state: present

- name: Create admin users
  user:
    name: "{{ item }}"
    state: present
    shell: /bin/bash
    groups: "{{ 'sudo' if ansible_os_family == 'Debian' else 'wheel' }}"
    append: yes
    password: "{{ admin_default_password_hash }}"
  loop:
    - admin_mendjargal
    - admin_yusunerdene
    - admin_bilegsaikhan

- name: Add admin users to sudo group (Debian)
  user:
    name: "{{ item }}"
    groups: sudo
    append: yes
  loop:
    - admin_mendjargal
    - admin_yusunerdene
    - admin_bilegsaikhan
  when: ansible_os_family == "Debian"

- name: Add wheel group to sudoers (RHEL)
  lineinfile:
    path: /etc/sudoers
    regexp: '^%wheel'
    line: '%wheel ALL=(ALL) ALL'
    validate: 'visudo -cf %s'
  when: ansible_os_family == "RedHat"

- name: Allow admin users passwordless sudo
  copy:
    dest: /etc/sudoers.d/admin_users
    content: |
      admin_mendjargal ALL=(ALL) NOPASSWD: ALL
      admin_yusunerdene ALL=(ALL) NOPASSWD: ALL
      admin_bilegsaikhan ALL=(ALL) NOPASSWD: ALL
    mode: '0440'
    validate: 'visudo -cf %s'

- name: Add admin users to sshgroup
  user:
    name: "{{ item }}"
    groups: sshgroup
    append: yes
  loop:
    - admin_mendjargal
    - admin_yusunerdene
    - admin_bilegsaikhan

- name: Check if scloud user exists
  command: id scloud
  register: scloud_check
  changed_when: false
  failed_when: false

- name: Add scloud to sshgroup (only if user exists)
  user:
    name: scloud
    groups: sshgroup
    append: yes
  when: scloud_check.rc == 0

- name: Force password change on first login
  command: chage -d 0 {{ item }}
  loop:
    - admin_mendjargal
    - admin_yusunerdene
    - admin_bilegsaikhan

- name: Set password aging for admin users (ISO standard)
  command: chage -M 90 -m 1 -W 14 {{ item }}
  loop:
    - admin_mendjargal
    - admin_yusunerdene
    - admin_bilegsaikhan

- name: Copy awxsvc SSH key to admin users
  authorized_key:
    user: "{{ item }}"
    state: present
    key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFawq1WbPc4sDOrrTy7iKOHjwU3xLO0yDAO/SyQyuJPI ansible-awx"
    path: "/home/{{ item }}/.ssh/authorized_keys"
    manage_dir: yes
  loop:
    - admin_mendjargal
    - admin_yusunerdene
    - admin_bilegsaikhan
  ignore_errors: yes
