---
- name: Remove broken third party repo files (RHEL)
  shell: |
    for repo in /etc/yum.repos.d/*.repo; do
      if grep -qiE "netdata|pgdg|enterprisedb|nginx-amplify" "$repo" 2>/dev/null; then
        echo "Removing: $repo"
        rm -f "$repo"
      fi
    done
    dnf clean all 2>/dev/null || true
  when: ansible_os_family == "RedHat"
  changed_when: false
  ignore_errors: yes

- name: Remove netdata apt repo if exists (Debian)
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/netdata.list
    - /etc/apt/sources.list.d/netdata-edge.list
  when: ansible_os_family == "Debian"
  ignore_errors: yes
