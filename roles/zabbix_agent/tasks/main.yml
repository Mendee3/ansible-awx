---
- name: Install Zabbix agent (RHEL)
  shell: |
    rpm -Uvh https://repo.zabbix.com/zabbix/6.0/rhel/8/x86_64/zabbix-release-6.0-1.el8.noarch.rpm 2>/dev/null || true
    dnf install -y zabbix-agent
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Install Zabbix agent (Ubuntu/Debian)
  shell: |
    wget -q https://repo.zabbix.com/zabbix/6.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_6.0-1+ubuntu22.04_all.deb -O /tmp/zabbix-release.deb
    dpkg -i /tmp/zabbix-release.deb
    apt-get update -y
    apt-get install -y zabbix-agent
  when: ansible_os_family == "Debian"
  ignore_errors: yes

- name: Ensure config directory exists
  file:
    path: /etc/zabbix/zabbix_agentd.conf.d
    state: directory
    owner: zabbix
    group: zabbix
    mode: '0755'

- name: Ensure log directory exists
  file:
    path: /var/log/zabbix
    state: directory
    owner: zabbix
    group: zabbix
    mode: '0755'

- name: Ensure run directory exists
  file:
    path: /run/zabbix
    state: directory
    owner: zabbix
    group: zabbix
    mode: '0755'

- name: Deploy Zabbix agent config
  template:
    src: zabbix_agentd.conf.j2
    dest: /etc/zabbix/zabbix_agentd.conf.d/zabbix.conf
    owner: zabbix
    group: zabbix
    mode: '0644'
  notify: restart zabbix-agent

- name: Enable and start zabbix-agent
  service:
    name: zabbix-agent
    state: started
    enabled: yes
