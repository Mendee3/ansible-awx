---
# ─────────────────────────────────────────
# RHEL/CentOS/Oracle/Alma - Disable third party repos
# ─────────────────────────────────────────
- name: Find all third party repo files (RHEL)
  find:
    paths: /etc/yum.repos.d/
    patterns: "*.repo"
  register: repo_files
  when: ansible_os_family == "RedHat"

- name: Disable third party repos (RHEL)
  shell: |
    for repo in /etc/yum.repos.d/*.repo; do
      filename=$(basename $repo)
      # Keep only base OS repos
      case "$filename" in
        redhat*.repo|rhel*.repo|centos*.repo|almalinux*.repo|\
        oracle*.repo|rocky*.repo|epel*.repo|baseos*.repo|\
        appstream*.repo|extras*.repo|powertools*.repo|crb*.repo)
          echo "Keeping: $filename"
          ;;
        *)
          echo "Disabling: $filename"
          dnf config-manager --disable $(basename $repo .repo) 2>/dev/null || \
          sed -i 's/^enabled=1/enabled=0/g' $repo
          ;;
      esac
    done
  when: ansible_os_family == "RedHat"
  changed_when: false
  ignore_errors: yes

- name: Clean dnf cache (RHEL)
  command: dnf clean all
  when: ansible_os_family == "RedHat"
  changed_when: false
  ignore_errors: yes

# ─────────────────────────────────────────
# Ubuntu/Debian - Fix broken repos
# ─────────────────────────────────────────
- name: Clean apt cache (Debian)
  command: apt-get clean
  when: ansible_os_family == "Debian"
  changed_when: false
  ignore_errors: yes

- name: Fix broken apt packages (Debian)
  command: apt-get install -f -y
  when: ansible_os_family == "Debian"
  changed_when: false
  ignore_errors: yes
