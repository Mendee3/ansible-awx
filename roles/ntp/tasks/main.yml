---
- name: Install chrony (RHEL/CentOS/Oracle/Alma)
  shell: |
    dnf install -y \
      --disablerepo="*" \
      --enablerepo="baseos,appstream,extras,crb,ol9_baseos_latest,ol9_appstream,almalinux*,rhel*" \
      chrony 2>&1
  when: ansible_os_family == "RedHat"
  ignore_errors: yes
  changed_when: false

- name: Install chrony (Ubuntu/Debian)
  apt:
    name: chrony
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Replace entire chrony config (RHEL)
  copy:
    dest: /etc/chrony.conf
    content: |
      # NTP Server - Digital Concept Internal
      server 172.18.9.2 iburst

      # Record the rate at which the system clock gains/losses time
      driftfile /var/lib/chrony/drift

      # Allow the system clock to be stepped in the first three updates
      makestep 1.0 3

      # Enable kernel synchronization of the real-time clock
      rtcsync

      # Log files
      logdir /var/log/chrony
    backup: yes
  when: ansible_os_family == "RedHat"
  notify: restart chrony

- name: Replace entire chrony config (Debian)
  copy:
    dest: /etc/chrony/chrony.conf
    content: |
      # NTP Server - Digital Concept Internal
      server 172.18.9.2 iburst

      # Record the rate at which the system clock gains/losses time
      driftfile /var/lib/chrony/drift

      # Allow the system clock to be stepped in the first three updates
      makestep 1.0 3

      # Enable kernel synchronization of the real-time clock
      rtcsync

      # Log files
      logdir /var/log/chrony
    backup: yes
  when: ansible_os_family == "Debian"
  notify: restart chrony

- name: Enable and start chrony (RHEL)
  systemd:
    name: chronyd
    enabled: yes
    state: started
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Enable and start chrony (Debian)
  systemd:
    name: chrony
    enabled: yes
    state: started
  when: ansible_os_family == "Debian"
  ignore_errors: yes

- name: Set timezone to Asia/Ulaanbaatar (UTC+8)
  command: timedatectl set-timezone Asia/Ulaanbaatar
  changed_when: false

- name: Verify timezone
  command: timedatectl show --property=Timezone
  register: timezone_result
  changed_when: false

- name: Show timezone
  debug:
    msg: "{{ timezone_result.stdout }}"
